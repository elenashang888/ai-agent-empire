<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAI - 代码生成助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Consolas', 'Monaco', monospace;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container { max-width: 900px; width: 100%; }
        h1 { color: #00ff88; text-align: center; margin-bottom: 10px; font-size: 2.5em; }
        .subtitle { color: rgba(255,255,255,0.7); text-align: center; margin-bottom: 30px; }
        .chat-box {
            background: #0f0f23;
            border-radius: 15px;
            padding: 20px;
            min-height: 400px;
            border: 1px solid #333;
        }
        .messages { height: 300px; overflow-y: auto; margin-bottom: 20px; padding: 10px; }
        .message { margin: 10px 0; padding: 12px 16px; border-radius: 8px; max-width: 85%; white-space: pre-wrap; font-family: 'Consolas', monospace; }
        .user { background: #00ff88; color: #000; margin-left: auto; }
        .ai { background: #1e3a5f; color: #00ff88; border: 1px solid #00ff88; }
        .input-area { display: flex; gap: 10px; }
        input {
            flex: 1;
            padding: 15px;
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 8px;
            color: #00ff88;
            font-size: 14px;
        }
        button {
            padding: 15px 30px;
            background: #00ff88;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }
        .feature {
            background: rgba(0,255,136,0.1);
            padding: 20px;
            border-radius: 10px;
            color: #00ff88;
            text-align: center;
            border: 1px solid #00ff88;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,255,136,0.2);
            color: #00ff88;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            border: 1px solid #00ff88;
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-btn">← 返回</a>
    <div class="container">
        <h1>💻 CodeAI</h1>
        <p class="subtitle">代码生成助手 - 让编程更高效</p>
        
        <div class="chat-box">
            <div class="messages" id="messages">
                <div class="message ai">你好！我是CodeAI代码助手。我可以帮你写代码、Debug、解释算法。请描述你需要的代码功能。</div>
            </div>
            <div class="input-area">
                <input type="text" id="input" placeholder="描述你需要的代码..." onkeypress="if(event.key==='Enter')send()">
                <button onclick="send()">生成</button>
            </div>
        </div>
        
        <div class="features">
            <div class="feature"><h3>🐍 多语言支持</h3><p>Python/JS/Java等</p></div>
            <div class="feature"><h3>🐛 智能Debug</h3><p>错误诊断与修复</p></div>
            <div class="feature"><h3>📖 代码解释</h3><p>逐行讲解代码</p></div>
            <div class="feature"><h3>⚡ 算法优化</h3><p>性能提升建议</p></div>
        </div>
    </div>
    
    <script>
        const responses = {
            'python': `【CodeAI】💻 Python代码示例！\n\n\`\`\`python\n# 快速排序算法\ndef quicksort(arr):\n    if len(arr) <= 1:\n        return arr\n    pivot = arr[len(arr) // 2]\n    left = [x for x in arr if x < pivot]\n    middle = [x for x in arr if x == pivot]\n    right = [x for x in arr if x > pivot]\n    return quicksort(left) + middle + quicksort(right)\n\n# 使用示例\nprint(quicksort([3,6,8,10,1,2,1]))\n# 输出: [1, 1, 2, 3, 6, 8, 10]\n\`\`\`\n\n💡 复杂度：O(n log n)\n需要其他语言的实现吗？`,
            'bug': `【CodeAI】🐛 Debug助手！\n\n常见错误排查：\n\n1️⃣ SyntaxError → 检查括号匹配、缩进\n2️⃣ NameError → 变量未定义，检查拼写\n3️⃣ TypeError → 类型不匹配，检查数据类型\n4️⃣ IndexError → 索引越界，检查列表长度\n\n🔧 Debug技巧：\n- 使用print()输出中间值\n- 使用IDE断点调试\n- 阅读错误堆栈信息\n\n贴出你的错误信息，我帮你分析！`,
            'default': `【CodeAI】收到需求！\n\n我可以帮你：\n✅ 写代码（Python/JS/Java等）\n✅ Debug排错\n✅ 代码解释\n✅ 算法优化\n\n试试说：写个Python爬虫/Debug这段代码`
        };

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = 'message ' + (isUser ? 'user' : 'ai');
            div.textContent = text;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = 999999;
        }
        
        function send() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text) return;
            
            addMessage(text, true);
            input.value = '';
            
            setTimeout(() => {
                let response = responses.default;
                for (let key in responses) {
                    if (text.toLowerCase().includes(key)) {
                        response = responses[key];
                        break;
                    }
                }
                addMessage(response, false);
            }, 500);
        }
    </script>
</body>
</html>
