<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContentAI - 内容创作助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container { max-width: 800px; width: 100%; }
        h1 { color: white; text-align: center; margin-bottom: 10px; font-size: 2.5em; }
        .subtitle { color: rgba(255,255,255,0.8); text-align: center; margin-bottom: 30px; }
        .chat-box {
            background: white;
            border-radius: 20px;
            padding: 20px;
            min-height: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .messages { height: 300px; overflow-y: auto; margin-bottom: 20px; padding: 10px; }
        .message { margin: 10px 0; padding: 12px 16px; border-radius: 12px; max-width: 80%; white-space: pre-wrap; }
        .user { background: #11998e; color: white; margin-left: auto; }
        .ai { background: #f0f0f0; color: #333; }
        .input-area { display: flex; gap: 10px; }
        input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        button {
            padding: 15px 30px;
            background: #11998e;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }
        .feature {
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 15px;
            color: white;
            text-align: center;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-btn">← 返回</a>
    <div class="container">
        <h1>✍️ ContentAI</h1>
        <p class="subtitle">内容创作助手 - 让创作更轻松</p>
        
        <div class="chat-box">
            <div class="messages" id="messages">
                <div class="message ai">你好！我是ContentAI内容创作助手。我可以帮你写文章、生成标题、改写文案。请告诉我你需要什么内容？</div>
            </div>
            <div class="input-area">
                <input type="text" id="input" placeholder="输入你的需求..." onkeypress="if(event.key==='Enter')send()">
                <button onclick="send()">发送</button>
            </div>
        </div>
        
        <div class="features">
            <div class="feature"><h3>📝 文章生成</h3><p>自动生成优质文章</p></div>
            <div class="feature"><h3>📰 标题优化</h3><p>爆款标题生成器</p></div>
            <div class="feature"><h3>🔄 文案改写</h3><p>多风格改写</p></div>
            <div class="feature"><h3>📊 内容分析</h3><p>SEO优化建议</p></div>
        </div>
    </div>
    
    <script>
        const responses = {
            '文章': `【ContentAI】✍️ 文章创作助手！\n\n📝 爆款文章结构：\n1️⃣ 钩子开头（痛点/悬念/数据）\n2️⃣ 3个核心观点\n3️⃣ 案例支撑\n4️⃣ 金句结尾+行动号召\n\n💡 标题公式：\n数字法：《3个方法让你效率翻倍》\n对比法：《从月薪3千到3万，我只做了这件事》\n悬念法：《为什么90%的人都在浪费时间？》`,
            '标题': `【ContentAI】📰 爆款标题生成！\n\n给你5个标题选项：\n1. 《揭秘：月入10万的秘密武器》\n2. 《别再犯这个错误！90%的人都中招》\n3. 《3分钟学会，受用一生》\n4. 《为什么聪明人都在用它？》\n5. 《从0到1：小白也能上手的攻略》\n\n需要针对具体领域优化吗？`,
            'default': `【ContentAI】收到需求！\n\n我可以帮你：\n✅ 写爆款文章\n✅ 生成吸睛标题\n✅ 改写多风格文案\n✅ SEO优化建议\n\n试试说：帮我写篇文章/生成标题`
        };

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = 'message ' + (isUser ? 'user' : 'ai');
            div.textContent = text;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = 999999;
        }
        
        function send() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text) return;
            
            addMessage(text, true);
            input.value = '';
            
            setTimeout(() => {
                let response = responses.default;
                for (let key in responses) {
                    if (text.includes(key)) {
                        response = responses[key];
                        break;
                    }
                }
                addMessage(response, false);
            }, 500);
        }
    </script>
</body>
</html>
